# Self-contained profile used by the public portfolio demo. The production
# defaults remain PostgreSQL + RabbitMQ for the distributed-system setup.
spring.datasource.url=jdbc:h2:mem:onlinestore;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.dynamic=false
management.health.rabbit.enabled=false

app.demo.seed=true
app.messaging.enabled=false
app.outbox.enabled=false
logging.level.org.springframework.amqp.rabbit.connection=ERROR
