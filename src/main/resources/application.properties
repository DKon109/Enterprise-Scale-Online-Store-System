
spring.application.name=onlinestore


spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ======================
# Server configuration
# ======================
server.port=8081

# ======================
# RabbitMQ configuration
# ======================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=10s
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.multiplier=10.0
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=10s
spring.rabbitmq.listener.simple.retry.max-attempts=4
spring.rabbitmq.listener.simple.retry.multiplier=1.5


# ======================
# JPA / Hibernate
# ======================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

# ======================
# Logger
# ======================
logging.level.org.springframework=INFO
logging.level.com.comp5348=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ======================
# PostgreSQL configuration
# ======================
spring.datasource.url=jdbc:postgresql://localhost:5432/onlinestore
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# JWT configuration
# ======================
jwt.secret=your-secret-key-change-this-in-production-at-least-32-characters-long
jwt.expiration=86400000

# ======================
# External Service URLs
# ======================
bank.service.url=http://localhost:8081
inventory.service.url=http://localhost:8081
delivery.service.url=http://localhost:8081
email.service.url=http://localhost:8082

# ======================
# Worker Configuration
# ======================
outbox.worker.interval=5000
outbox.worker.max-retries=5
shipment.worker.interval=10000



